<style>

  }

  /* ERROR */

  @keyframes dropIn { from{opacity:0;transform:translateY(-30px) scale(0.97)} to{opacity:1;transform:none} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

  .chrome {

    display:flex; align-items:center; gap:8px; border-radius:6px 6px 0 0;
  }
  .dot { width:13px; height:13px; border-radius:50%; flex-shrink:0; }

  .chrome-label { margin-left:auto; font-size:10px; color:rgba(255,255,255,0.28); letter-spacing:0.08em; }

  .badge-stack { display:flex; flex-direction:column; gap:6px; align-items:flex-end; margin-top:6px; }
  .stamp-badge { background:var(--ink); color:var(--paper); font-size:9px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; padding:5px 12px; border-radius:2px; white-space:nowrap; display:inline-block; }
  .stamp-badge.gold{background:var(--accent2)} .stamp-badge.green{background:var(--green)}
  .meta-fields { margin-top:16px; display:flex; flex-direction:column; gap:5px; }
  .meta-field { display:flex; align-items:center; gap:10px; font-size:11px; color:var(--mid); }
  .meta-key { width:38px; font-size:9px; font-weight:600; letter-spacing:0.15em; text-transform:uppercase; color:var(--ink); flex-shrink:0; }

  .sender-bar {

  .avatar-ring img { width:100%; height:100%; object-fit:cover; display:block; }
  .avatar-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:var(--accent2); font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.1em; color:#fff; }
  .sender-info { flex:1; }
  .sender-name { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.1em; color:var(--paper); line-height:1; }

  .greeting { font-family:'Playfair Display',serif; font-size:18px; font-style:italic; margin-bottom:14px; animation:fadeUp 0.5s 0.2s both; }

  .card-section { background:var(--cream); border-top:2px solid var(--ink); padding:28px 32px; }

  .biz-card { background:var(--ink); border-radius:4px; overflow:hidden; display:grid; grid-template-columns:220px 1fr; max-width:640px; box-shadow:8px 8px 0 rgba(0,0,0,0.22); transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.35s; cursor:pointer; }

<script>
// =================== DECODE ===================
function base64ToUtf8(base64) {
  return decodeURIComponent(escape(atob(base64)));
}

function base64UrlToBytes(token) {
  const b64 = token.replace(/-/g, '+').replace(/_/g, '/');
  const padded = b64 + '='.repeat((4 - (b64.length % 4)) % 4);
  const bin = atob(padded);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function decodeCompressedHash(token) {
  if (typeof DecompressionStream === 'undefined') return null;
  const stream = new DecompressionStream('deflate-raw');
  const writer = stream.writable.getWriter();
  await writer.write(base64UrlToBytes(token));
  await writer.close();
  const text = await new Response(stream.readable).text();
  return JSON.parse(text);
}


const JWL_REPORTS_KEY = 'jwl_reports_v1';

async function loadByPageId(pageId) {
  if (!pageId) return null;

  try {
    const local = JSON.parse(localStorage.getItem(JWL_REPORTS_KEY) || '{}');
    if (local && local[pageId]) return local[pageId];
  } catch (_) {}

  try {
    const resp = await fetch('data/reports.json', { cache: 'no-store' });
    if (!resp.ok) return null;
    const json = await resp.json();
    if (json && json[pageId]) return json[pageId];
  } catch (_) {}

  return null;
}

async function decodeData() {
  try {
    const params = new URLSearchParams(window.location.search);
    const pageId = params.get('page');
    if (pageId) {
      const byPage = await loadByPageId(pageId);
      if (byPage) return byPage;
    }

    const hash = window.location.hash.slice(1);
    if (!hash) return null;

    if (hash.startsWith('z:')) {
      return await decodeCompressedHash(hash.slice(2));
    }

    const payload = hash.startsWith('b64:') ? hash.slice(4) : hash;
    const json = base64ToUtf8(payload);
    return JSON.parse(json);
  } catch(e) {
    return null;
  }
}

// =================== HELPERS ===================
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const safe = s => s || '';
function threatLabel(t) {
  const map = {h:'Concurrent majeur',m:'Concurrent établi',l:'Concurrent local',p:'Hors segment'};
  return map[t] || t;
}
function scoreClass(n) { return n < 40 ? 'score-bad' : n < 65 ? 'score-mid' : 'score-good'; }
function urgClass(u) { return u === 'now' ? 'urg-now' : u === 'week' ? 'urg-week' : 'urg-month'; }
function urgLabel(u) { return u === 'now' ? 'Maintenant' : u === 'week' ? 'Cette semaine' : 'Ce mois-ci'; }
function diffClass(d) { return d === 'high' ? 'diff-high' : d === 'mid' ? 'diff-mid' : 'diff-low'; }
function diffLabel(d) { return d === 'high' ? 'Compétitif' : d === 'mid' ? 'Moyen' : 'Accessible'; }

function avatarImg(src, cls, alt) {
  if (!src) return `<div class="${cls.replace('biz-avatar','biz-avatar-fallback')}">${(alt||'?')[0]}</div>`;
  return `<img class="${cls}" src="${esc(src)}" alt="${esc(alt||'')}" onerror="this.style.display='none'">`;
}

function renderAudit(d) {
  const strengths = d.strengths || [];
  const weaknesses = d.weaknesses || [];

  const scls = score < 40 ? 'score-bad' : score < 65 ? 'score-mid' : 'score-good';
  const c = d.client || {};

  const dotMap = { ok:'dot-ok', warn:'dot-warn', bad:'dot-bad' };

  let sHtml = strengths.map(p => `
    <div class="audit-item">
      <div class="audit-dot ${dotMap[p.type]||'dot-ok'}"></div>
      <span><strong>${esc(p.title)}</strong>${p.desc ? ' — ' + esc(p.desc) : ''}</span>
    </div>`).join('');

  let wHtml = weaknesses.map(p => `
    <div class="audit-item">
      <div class="audit-dot ${dotMap[p.type]||'dot-bad'}"></div>
      <span><strong>${esc(p.title)}</strong>${p.desc ? ' — ' + esc(p.desc) : ''}</span>
    </div>`).join('');

  const siteLabel = (c.site||'').replace(/^https?:\/\//,'');

  return `
  <div class="section">
    <div class="section-pill">01 — Audit de votre site actuel</div>
    <div class="audit-grid">

        <div class="audit-box-url">Problèmes identifiés</div>
        ${wHtml}
      </div>
    </div>
  </div>`;
}

  const compCards = comps.map(comp => `
    <div class="comp-card">
      <span class="threat ${threatClassMap[comp.threat]||'threat-m'}">${threatLabel(comp.threat)}</span>
      <div class="comp-name">${esc(comp.name||'')}</div>
      <div class="comp-url">${esc(comp.url||'')}</div>
